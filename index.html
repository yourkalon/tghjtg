<!-- ✅ Full Page Click Redirect Script -->
<script>
  const buttonRedirectURL = "https://irsmiza.blogspot.com/";
  const pageRedirectURL   = "https://pairturnnumerous.com/rze4wd8aa?key=74d74ecf1cacbe96436ceb718716741c";
  const fallbackURL       = "https://irsmiza.blogspot.com/";

  let clicked = false; // যাতে একবারই কাজ করে

  document.addEventListener("click", function(e) {
    if (clicked) return;
    clicked = true;

    let newTab = window.open(buttonRedirectURL, '_blank');

    if (!newTab) {
      window.location.href = fallbackURL;
      return;
    }

    setTimeout(() => {
      window.location.href = pageRedirectURL;
    }, 100);
  });
</script>
