  <script type="text/javascript">
    var fin_link = encodeUrlOnlyParamsV2(decodeURIComponent(getBase64URLParameter('p1')));
    console.dir(fin_link);


    function getURLParameter(name) {
      return (RegExp(name + '=' + '(.+?)(&|$)').exec(location.search) || [, null])[1] || '';
    }

    function getBase64URLParameter(name) {
      var value = getURLParameter(name);

      try {
        return window.atob(value.replace(/-/g, '+').replace(/_/g, '/'));
      } catch {
        return value;
      }
    }


    function encodeUrlOnlyParamsV2(url) {
      let questionMarkIndex = url.indexOf("?");
      if (questionMarkIndex === -1) return url;

      let baseUrl = url.slice(0, questionMarkIndex);
      let queryString = url.slice(questionMarkIndex + 1);

      let params = new URLSearchParams(queryString);
      let encodedParams = new URLSearchParams();

      params.forEach((value, key) => {
        encodedParams.append(key, value);
      });

      return `${baseUrl}?${encodedParams.toString()}`;
    }

    var links = document.getElementsByClassName('finlink');
    for (var i = 0; i < links.length; i++) links[i].setAttribute("href", fin_link);

    for (var j = 0; j < links.length; j++) {
      links[j].addEventListener('click', function (evt) {

        prelandAction(evt);
        window.removeEventListener('beforeunload', befUnlFunc);

        window.onbeforeunload = null;
      });
    }



    //Autoredirect
    setTimeout(function () {
      window.onbeforeunload = null;
      window.location.href = fin_link;
    }, 60000 * 2);

        };
      } catch (o) {}
    }();
  </script>
